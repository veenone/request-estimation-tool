# Test Effort Estimation Tool — Docker Compose
#
# Usage:
#   docker-compose up -d                         # SQLite mode (default)
#   docker-compose --profile mysql up -d         # With MySQL backend
#
# HTTPS access (via nginx reverse proxy):
#   https://<hostname>:8444  → Streamlit UI
#   https://<hostname>:8445  → NiceGUI UI (recommended)
#   Both ports also proxy /api/* to the FastAPI backend.
#
# Environment variables (override via .env or shell exports):
#   DB_TYPE                  sqlite | mysql  (default: sqlite)
#   DB_URL                   SQLAlchemy URL  (default: sqlite:////app/data/estimation.db)
#   MYSQL_ROOT_PASSWORD      (default: estimation_secret)
#   MYSQL_DATABASE           (default: estimation)
#   MYSQL_USER               (default: estimation)
#   MYSQL_PASSWORD           (default: estimation_pass)

services:
  app:
    build: .
    environment:
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_URL=${DB_URL:-sqlite:////app/data/estimation.db}
      - API_URL=http://localhost:8000/api
      - no_proxy=localhost,127.0.0.1,.corp.idemia.com
      - NO_PROXY=localhost,127.0.0.1,.corp.idemia.com
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    volumes:
      - app_data:/app/data
      - /data/certs/i2j6xxx2v000x-ca.crt:/usr/local/share/ca-certificates/corp-ca.crt:ro
    entrypoint: ["/bin/bash", "-c", "update-ca-certificates 2>/dev/null; exec /app/entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
        required: false

  nginx:
    image: nginx:latest
    ports:
      - "8444:8444"   # Streamlit UI
      - "8445:8445"   # NiceGUI UI (recommended)
    volumes:
      - /data/certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-estimation_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-estimation}
      MYSQL_USER: ${MYSQL_USER:-estimation}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-estimation_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - mysql
    restart: unless-stopped

volumes:
  app_data:
  mysql_data:
